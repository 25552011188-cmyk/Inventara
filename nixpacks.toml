[phases.setup]
nixPkgs = ["php82", "php82Extensions.gd", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.zip", "php82Extensions.bcmath", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.intl"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port 8080"